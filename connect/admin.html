<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Console | Abbas Uddin</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

  <style>
    /* --- SHARED THEME --- */
    :root {
      --bg-dark: #1A1C22;
      --neon-cyan: #03dac6;
      --neon-red: #ff2a2a; 
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #e0e0e0;
      --msg-me: rgba(255, 42, 42, 0.15);
      --msg-other: rgba(3, 218, 198, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Space Grotesk", sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      height: 100svh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Backgrounds */
    .bg-glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255, 42, 42, 0.05) 0%, transparent 70%); border-radius: 50%; top: -200px; left: -200px; z-index: -1; pointer-events: none; }
    .bg-glow-2 { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(3, 218, 198, 0.05) 0%, transparent 70%); border-radius: 50%; bottom: -100px; right: -100px; z-index: -1; pointer-events: none; }

    .container { width: 100%; max-width: 600px; padding: 1.5rem; display: flex; flex-direction: column; height: 100%; position: relative; }

    /* --- AUTH OVERLAY --- */
    #authOverlay {
      position: absolute; inset: 0; 
      background: rgba(26, 28, 34, 0.98);
      backdrop-filter: blur(20px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }
    
    .login-card {
      background: var(--glass-bg);
      border: 1px solid var(--neon-red);
      padding: 2.5rem;
      border-radius: 24px;
      text-align: center;
      width: 90%; max-width: 350px;
      box-shadow: 0 0 30px rgba(255, 42, 42, 0.1);
      display: flex; flex-direction: column; gap: 1rem;
    }

    .auth-input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      color: var(--neon-red);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      letter-spacing: 3px;
      font-family: inherit;
      outline: none; transition: 0.3s;
    }
    .auth-input:focus { border-color: var(--neon-red); box-shadow: 0 0 15px rgba(255, 42, 42, 0.2); }

    .unlock-btn {
      background: var(--neon-red); color: #000; font-weight: 700;
      border: none; padding: 12px; border-radius: 12px;
      cursor: pointer; transition: 0.3s; text-transform: uppercase;
      letter-spacing: 1px; width: 100%;
    }
    .unlock-btn:hover { box-shadow: 0 0 20px rgba(255, 42, 42, 0.4); transform: scale(1.02); }

    /* --- HEADER --- */
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding: 0.5rem; }
    h1 { font-size: 1.2rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
    .status-badge { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--neon-red); background: rgba(255, 42, 42, 0.1); padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(255, 42, 42, 0.2); }
    .dot { width: 6px; height: 6px; background: var(--neon-red); border-radius: 50%; }

    /* --- CHAT AREA --- */
    .chat-box { flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(10px); position: relative; }
    .messages { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
    .messages::-webkit-scrollbar { width: 4px; } .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 0.95rem; line-height: 1.4; position: relative; word-wrap: break-word; animation: slideIn 0.3s ease; }
    .msg-user { align-self: flex-start; background: var(--msg-other); border: 1px solid var(--neon-cyan); border-bottom-left-radius: 2px; color: #fff; }
    .msg-admin { align-self: flex-end; background: var(--msg-me); border: 1px solid var(--neon-red); border-bottom-right-radius: 2px; color: #fff; }
    
    .label { font-size: 0.65rem; opacity: 0.7; margin-bottom: 4px; display: block; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

    /* --- FLOATING PREVIEW (RED) --- */
    .floating-preview {
      display: none;
      position: absolute;
      bottom: 85px;
      left: 1rem;
      z-index: 100;
      animation: slideUp 0.3s ease-out;
    }
    .preview-content {
      position: relative;
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      padding: 6px;
      border: 1px solid var(--neon-red);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 42, 42, 0.2);
    }
    .preview-content img { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; display: block; }
    .cancel-badge { position: absolute; top: -10px; right: -10px; background: var(--bg-dark); color: var(--neon-red); border-radius: 50%; cursor: pointer; display: flex; box-shadow: 0 0 10px rgba(255, 42, 42, 0.5); }

    /* --- INPUT AREA --- */
    .input-row { padding: 1rem; background: rgba(0, 0, 0, 0.2); border-top: 1px solid var(--glass-border); display: flex; width: 100%; }
    .input-wrapper {
      display: flex; align-items: center; flex: 1; background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border); border-radius: 12px; padding: 4px 8px; transition: 0.3s; position: relative; overflow: hidden;
    }
    .input-wrapper:focus-within { border-color: var(--neon-red); background: rgba(255, 42, 42, 0.05); }

    #msgInput { flex: 1; background: transparent !important; border: none !important; padding: 10px; color: #fff; outline: none; font-family: inherit; }
    .inside-btn { background: transparent; border: none; color: var(--text-main); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
    .send-accent { color: var(--neon-red) !important; }
    
    #uploadProgress { position: absolute; top: 0; left: 0; height: 2px; background: var(--neon-red); width: 0%; transition: width 0.1s; z-index: 10; }

    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <div class="container">
    
    <div id="authOverlay">
      <div class="login-card">
        <i data-lucide="shield-alert" style="color: var(--neon-red); width: 48px; height: 48px; margin: 0 auto;"></i>
        <h2 style="color:#fff; font-size: 1.5rem; margin: 0;">Restricted Access</h2>
        <input type="password" id="passInput" class="auth-input" placeholder="ACCESS CODE">
        <button id="unlockBtn" class="unlock-btn">UNLOCK TERMINAL</button>
        <div id="loginStatus" style="font-size: 0.8rem; color: #888; margin-top: 5px;"></div>
      </div>
    </div>

    <header>
      <h1><i data-lucide="terminal-square" style="color: var(--neon-red);"></i> Admin Console</h1>
      <div class="status-badge"><div class="dot"></div><span>Secure</span></div>
    </header>

    <div class="chat-box">
      <div class="messages" id="msgList"></div>

      <div id="filePreviewContainer" class="floating-preview">
        <div class="preview-content">
          <img id="imagePreview" src="" alt="Preview">
          <div id="cancelFileBtn" class="cancel-badge"><i data-lucide="circle-x"></i></div>
        </div>
      </div>

      <div class="input-row">
        <div class="input-wrapper">
          <div id="uploadProgress"></div>
          <button id="attachBtn" class="inside-btn"><i data-lucide="paperclip"></i></button>
          <input type="file" id="fileInput" style="display: none;">
          <input type="text" id="msgInput" placeholder="Reply as Admin..." disabled>
          <button id="sendBtn" class="inside-btn send-accent" disabled><i data-lucide="send"></i></button>
        </div>
      </div>
    </div>

  </div>

  <script>
    lucide.createIcons();
    const SERVER_URL = "https://abbas-chat-server.onrender.com"; 

    let socket, ADMIN_PASSWORD = "", currentFile = null;

    const authOverlay = document.getElementById('authOverlay');
    const passInput = document.getElementById('passInput');
    const unlockBtn = document.getElementById('unlockBtn');
    const loginStatus = document.getElementById('loginStatus');
    const msgList = document.getElementById('msgList');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('filePreviewContainer');
    const imagePreview = document.getElementById('imagePreview');
    const cancelFileBtn = document.getElementById('cancelFileBtn');
    const progressBar = document.getElementById('uploadProgress');

    function triggerLogin() {
      const pass = passInput.value.trim();
      if (pass) {
        ADMIN_PASSWORD = pass;
        loginStatus.textContent = "Connecting...";
        initConnection();
      }
    }

    unlockBtn.addEventListener('click', triggerLogin);
    passInput.addEventListener('keypress', (e) => e.key === 'Enter' && triggerLogin());

    function initConnection() {
      socket = io(SERVER_URL);
      socket.on('connect', () => {
        authOverlay.style.display = 'none';
        msgInput.disabled = false;
        sendBtn.disabled = false;
      });
      socket.on('auth_error', (msg) => {
        alert(msg);
        location.reload();
      });
      socket.on('chat message', (data) => {
  const type = data.isAdmin ? 'admin' : 'user';
  addMessage(data.text, type, data.file);
  
  if (!data.isAdmin) {
    playNotificationSound();
  }
});
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function addMessage(text, type, file = null) {
      const div = document.createElement('div');
      div.className = `msg msg-${type}`;
      const label = type === 'admin' ? 'YOU (ADMIN)' : 'VISITOR';
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      let contentHTML = '';
      if (file) {
        if (file.mimetype.startsWith('image/')) {
          contentHTML = `<img src="${escapeHTML(file.url)}" style="max-width: 100%; border-radius: 8px;">`;
        } else {
          contentHTML = `<a href="${escapeHTML(file.url)}" target="_blank" style="color: var(--neon-red);">File: ${escapeHTML(file.filename)}</a>`;
        }
      }
      if (text) contentHTML += (contentHTML ? '<br>' : '') + escapeHTML(text);

      div.innerHTML = `<span class="label" style="color: ${type === 'admin' ? 'var(--neon-red)' : 'var(--neon-cyan)'}">${label}</span>${contentHTML}<span class="time">${time}</span>`;
      msgList.appendChild(div);
      msgList.scrollTop = msgList.scrollHeight;
      lucide.createIcons();
    }
    // Generate a themed "blip" sound
function playNotificationSound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // High A note
    oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1); // Drop frequency

    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // Low volume
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.1);
  } catch (e) {
    console.log("Audio playback blocked or unsupported.");
  }
}
    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      currentFile = file;
      previewContainer.style.display = 'block';
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => imagePreview.src = ev.target.result;
        reader.readAsDataURL(file);
      } else {
        imagePreview.src = "https://cdn-icons-png.flaticon.com/512/2991/2991112.png";
      }
      sendBtn.disabled = false;
    });

    function clearAttachment() {
      currentFile = null; fileInput.value = ''; previewContainer.style.display = 'none';
      msgInput.placeholder = "Reply as Admin...";
    }
    cancelFileBtn.addEventListener('click', clearAttachment);

    function uploadFile(file) {
      return new Promise((resolve) => {
        const xhr = new XMLHttpRequest();
        const formData = new FormData();
        formData.append('file', file);
        xhr.upload.addEventListener('progress', (e) => progressBar.style.width = (e.loaded/e.total*100)+'%');
        xhr.onreadystatechange = () => {
          if (xhr.readyState === XMLHttpRequest.DONE) {
            setTimeout(() => progressBar.style.width = '0%', 500);
            resolve(xhr.status === 200 ? JSON.parse(xhr.responseText) : null);
          }
        };
        xhr.open('POST', `${SERVER_URL}/upload`, true);
        xhr.send(formData);
      });
    }

    async function sendReply() {
      const text = msgInput.value.trim();
      if (!text && !currentFile) return;
      let fileData = null;
      if (currentFile) {
        fileData = await uploadFile(currentFile);
        if (!fileData) return alert("Upload Failed");
      }
      socket.emit('chat message', { text, senderId: 'ADMIN', isAdmin: true, password: ADMIN_PASSWORD, file: fileData });
      msgInput.value = ''; clearAttachment();
    }

    sendBtn.addEventListener('click', sendReply);
    msgInput.addEventListener('keypress', (e) => e.key === 'Enter' && sendReply());
  </script>
</body>
</html>
