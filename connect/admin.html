<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Console | Abbas Uddin</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

  <style>
    /* --- SHARED THEME --- */
    :root {
      --bg-dark: #1A1C22;
      --neon-cyan: #03dac6;
      --neon-red: #ff2a2a; 
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #e0e0e0;
      --msg-me: rgba(255, 42, 42, 0.15);
      --msg-other: rgba(3, 218, 198, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Space Grotesk", sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      height: 100svh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .bg-glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255, 42, 42, 0.05) 0%, transparent 70%); border-radius: 50%; top: -200px; left: -200px; z-index: -1; pointer-events: none; }
    .bg-glow-2 { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(3, 218, 198, 0.05) 0%, transparent 70%); border-radius: 50%; bottom: -100px; right: -100px; z-index: -1; pointer-events: none; }

    .container { width: 100%; max-width: 1200px; padding: 1.5rem; display: flex; flex-direction: column; height: 100%; position: relative; }

    /* --- AUTH OVERLAY --- */
    #authOverlay { position: absolute; inset: 0; background: rgba(26, 28, 34, 0.98); backdrop-filter: blur(20px); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--glass-bg); border: 1px solid var(--neon-red); padding: 2.5rem; border-radius: 24px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 0 30px rgba(255, 42, 42, 0.1); display: flex; flex-direction: column; gap: 1rem; }
    .auth-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: var(--neon-red); padding: 12px; border-radius: 12px; text-align: center; letter-spacing: 3px; font-family: inherit; outline: none; transition: 0.3s; }
    .auth-input:focus { border-color: var(--neon-red); box-shadow: 0 0 15px rgba(255, 42, 42, 0.2); }
    .unlock-btn { background: var(--neon-red); color: #000; font-weight: 700; border: none; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; width: 100%; }
    .unlock-btn:hover { box-shadow: 0 0 20px rgba(255, 42, 42, 0.4); transform: scale(1.02); }
    #loginStatus { font-size: 0.8rem; color: #888; min-height: 1.2em; }

    /* --- HEADER --- */
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding: 0.5rem; }
    h1 { font-size: 1.2rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
    .status-badge { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--neon-red); background: rgba(255, 42, 42, 0.1); padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(255, 42, 42, 0.2); }
    .dot { width: 6px; height: 6px; background: var(--neon-red); border-radius: 50%; }

    /* --- SPLIT VIEW WORKSPACE --- */
    .workspace { flex: 1; display: flex; overflow: hidden; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.2); position: relative; }

    /* --- SIDEBAR --- */
    .sidebar { width: 320px; border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.1); z-index: 40; transition: transform 0.3s ease; }
    .sidebar-header { padding: 1rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; font-weight: 700; border-bottom: 1px solid var(--glass-border); color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 1px; }
    .user-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .user-item { padding: 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.03); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
    .user-item:hover { background: rgba(3, 218, 198, 0.05); }
    .user-item.active { background: rgba(3, 218, 198, 0.1); border-left: 3px solid var(--neon-cyan); }
    .user-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, rgba(3, 218, 198, 0.2), transparent); border: 1px solid rgba(3, 218, 198, 0.5); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--neon-cyan); }
    .user-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .user-header { display: flex; justify-content: space-between; align-items: center; }
    .user-id { font-size: 0.95rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-time { font-size: 0.65rem; color: #888; white-space: nowrap; }
    .user-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .user-preview { font-size: 0.8rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .user-preview.unread { color: #fff; font-weight: 500; }
    .unread-badge { background: var(--neon-red); color: #000; font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 10px; display: none; flex-shrink: 0; }
    .unread-badge.show { display: inline-block; }
    .origin-badge { font-size: 0.6rem; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; color: var(--neon-cyan); }

    /* --- CHAT AREA --- */
    .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
    
    /* WhatsApp-Style Header */
    .chat-header { padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); }
    .header-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, rgba(3, 218, 198, 0.2), transparent); border: 1px solid rgba(3, 218, 198, 0.5); display: flex; align-items: center; justify-content: center; color: var(--neon-cyan); }
    .header-text { display: flex; flex-direction: column; justify-content: center; }
    .header-name { font-weight: 700; color: #fff; font-size: 1rem; }
    .header-origin { font-size: 0.75rem; color: var(--neon-cyan); opacity: 0.8; display: flex; align-items: center; gap: 4px;}
    
    .no-chat-selected { position: absolute; inset: 0; background: var(--bg-dark); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; }
    
    /* MOBILE DRAWER TOGGLES */
    .menu-toggle { display: none; background: transparent; border: none; color: #fff; cursor: pointer; padding: 8px; }
    .close-sidebar-btn { display: none; background: transparent; border: none; color: var(--neon-red); cursor: pointer; }
    .sidebar-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 30; backdrop-filter: blur(2px); opacity: 0; transition: opacity 0.3s; }

    .messages { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth;}
    .messages::-webkit-scrollbar { width: 4px; } .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 0.95rem; line-height: 1.4; position: relative; word-wrap: break-word; animation: slideIn 0.3s ease; }
    .msg-user { align-self: flex-start; background: var(--msg-other); border: 1px solid var(--neon-cyan); border-bottom-left-radius: 2px; color: #fff; }
    .msg-admin { align-self: flex-end; background: var(--msg-me); border: 1px solid var(--neon-red); border-bottom-right-radius: 2px; color: #fff; }
    .label { font-size: 0.65rem; opacity: 0.7; margin-bottom: 4px; display: block; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .time { font-size: 0.65rem; opacity: 0.5; margin-top: 4px; display: block; text-align: right; }

    /* --- FLOATING PREVIEW --- */
    .floating-preview { display: none; position: absolute; bottom: 85px; left: 1rem; z-index: 100; animation: slideUp 0.3s ease-out; }
    .preview-content { position: relative; background: var(--glass-bg); backdrop-filter: blur(15px); padding: 6px; border: 1px solid var(--neon-red); border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 42, 42, 0.2); }
    .preview-content img { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; display: block; }
    .cancel-badge { position: absolute; top: -10px; right: -10px; background: var(--bg-dark); color: var(--neon-red); border-radius: 50%; cursor: pointer; display: flex; transition: transform 0.2s; }
    .cancel-badge:hover { transform: scale(1.2); }

    /* --- INPUT AREA --- */
    .input-row { padding: 1rem; background: rgba(0, 0, 0, 0.2); border-top: 1px solid var(--glass-border); display: flex; width: 100%; }
    .input-wrapper { display: flex; align-items: center; flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 4px 8px; transition: 0.3s; position: relative; overflow: hidden; }
    .input-wrapper:focus-within { border-color: var(--neon-red); background: rgba(255, 42, 42, 0.05); box-shadow: 0 0 15px rgba(255, 42, 42, 0.1); }
    #msgInput { flex: 1; background: transparent !important; border: none !important; padding: 10px; color: #fff; outline: none; font-family: inherit; }
    .inside-btn { background: transparent; border: none; color: var(--text-main); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
    .send-accent, .send-accent:disabled { color: var(--neon-red) !important; opacity: 1 !important; }
    .inside-btn:disabled { cursor: default; transform: none; }
    #uploadProgress { position: absolute; top: 0; left: 0; height: 2px; background: var(--neon-red); width: 0%; transition: width 0.1s; box-shadow: 0 0 8px var(--neon-red); z-index: 10; }

    /* MOBILE RESPONSIVENESS */
    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      .close-sidebar-btn { display: block; }
      .sidebar { position: absolute; left: -100%; top: 0; bottom: 0; height: 100%; background: rgba(26, 28, 34, 0.98); border-right: 1px solid var(--neon-cyan); box-shadow: 5px 0 25px rgba(0,0,0,0.5); }
      .sidebar.open { left: 0; }
      .sidebar-overlay.active { display: block; opacity: 1; }
    }

    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <div class="container">
    
    <div id="authOverlay">
      <div class="login-card">
        <i data-lucide="shield-alert" style="color: var(--neon-red); width: 48px; height: 48px; margin: 0 auto;"></i>
        <h2 style="color:#fff; font-size: 1.5rem; margin: 0;">Restricted Access</h2>
        <input type="password" id="passInput" class="auth-input" placeholder="ACCESS CODE" autocomplete="off">
        <button id="unlockBtn" class="unlock-btn">UNLOCK TERMINAL</button>
        <div id="loginStatus"></div>
      </div>
    </div>

    <header>
      <h1><i data-lucide="terminal-square" style="color: var(--neon-red);"></i> Admin Console</h1>
      <div class="status-badge">
        <div class="dot" style="animation: none;"></div>
        <span id="statusText">Awaiting Auth</span>
      </div>
    </header>

    <div class="workspace">
      
      <div id="sidebarOverlay" class="sidebar-overlay"></div>

      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span>Active Sessions</span>
          <button id="closeSidebar" class="close-sidebar-btn"><i data-lucide="x"></i></button>
        </div>
        <div class="user-list" id="userList"></div>
      </div>

      <div class="chat-area">
        <div class="no-chat-selected" id="noChatScreen">
          <button id="openSidebarEmpty" class="menu-toggle" style="position:absolute; top: 1rem; left: 1rem;"><i data-lucide="menu"></i></button>
          <i data-lucide="message-square-dashed" style="width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.5;"></i>
          <p>Select a visitor to start chatting.</p>
        </div>

        <div class="chat-header" id="chatHeader">
          <button id="openSidebar" class="menu-toggle"><i data-lucide="menu"></i></button>
          <div class="header-avatar"><i data-lucide="user"></i></div>
          <div class="header-text">
            <div class="header-name" id="chatHeaderName">Visitor</div>
            <div class="header-origin"><i data-lucide="globe" style="width:12px; height:12px;"></i> <span id="chatHeaderOrigin">Unknown Site</span></div>
          </div>
        </div>

        <div class="messages" id="msgList"></div>

        <div id="filePreviewContainer" class="floating-preview">
          <div class="preview-content">
            <img id="imagePreview" src="" alt="Preview">
            <div id="cancelFileBtn" class="cancel-badge"><i data-lucide="circle-x"></i></div>
          </div>
        </div>

        <div class="input-row">
          <div class="input-wrapper">
            <div id="uploadProgress"></div>
            <button id="attachBtn" class="inside-btn" disabled><i data-lucide="paperclip"></i></button>
            <input type="file" id="fileInput" style="display: none;">
            <input type="text" id="msgInput" placeholder="Reply to visitor..." disabled autocomplete="off">
            <button id="sendBtn" class="inside-btn send-accent" disabled><i data-lucide="send"></i></button>
          </div>
        </div>
      </div>

    </div>

  </div>

  <script>
    lucide.createIcons();

    const SERVER_URL = "https://abbas-chat-server.onrender.com"; 
    let socket;
    
    // SECURE TOKEN
    let ADMIN_TOKEN = null; 
    let ADMIN_PASSWORD = null;

    // STATE DICTIONARY 
    const activeChats = {}; 
    let currentSelectedUser = null;
    let currentFile = null;

    // DOM ELEMENTS
    const authOverlay = document.getElementById('authOverlay');
    const passInput = document.getElementById('passInput');
    const unlockBtn = document.getElementById('unlockBtn');
    const loginStatus = document.getElementById('loginStatus');
    const statusText = document.getElementById('statusText');
    const statusDot = document.querySelector('.status-badge .dot');

    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const userListUI = document.getElementById('userList');
    const msgListUI = document.getElementById('msgList');
    const noChatScreen = document.getElementById('noChatScreen');
    
    const chatHeaderName = document.getElementById('chatHeaderName');
    const chatHeaderOrigin = document.getElementById('chatHeaderOrigin');

    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const cancelFileBtn = document.getElementById('cancelFileBtn');
    const previewContainer = document.getElementById('filePreviewContainer');
    const imagePreview = document.getElementById('imagePreview');
    const progressBar = document.getElementById('uploadProgress');

    // --- MOBILE DRAWER LOGIC ---
    function toggleSidebar() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('active');
    }
    document.getElementById('openSidebar').addEventListener('click', toggleSidebar);
    document.getElementById('openSidebarEmpty').addEventListener('click', toggleSidebar);
    document.getElementById('closeSidebar').addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    // --- AUDIO & HTML ESCAPING ---
    function playIncomingSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(660, audioCtx.currentTime); 
        oscillator.frequency.exponentialRampToValueAtTime(330, audioCtx.currentTime + 0.15);
        gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.15);
      } catch (e) { }
    }

    function escapeHTML(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    // --- AUTHENTICATION & DATABASE SYNC ---
    function initSocketListeners() {
      socket.on('connect', () => {
         socket.emit('admin login', ADMIN_PASSWORD);
      });

      // Parse Database History on Success
      socket.on('login success', (payload) => {
          ADMIN_TOKEN = payload.token; 
          
          authOverlay.style.display = 'none';
          statusText.textContent = "Secure";
          statusDot.style.animation = "pulse 2s infinite";

          for (let key in activeChats) {
              delete activeChats[key];
          }

          payload.history.forEach(msg => {
              const threadId = msg.isAdmin ? msg.targetUser : msg.senderId;
              if (!threadId) return; 
              
              if (!activeChats[threadId]) {
                  activeChats[threadId] = { messages: [], unread: 0, origin: msg.origin || 'Unknown Site' };
              }

              const timeStr = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              
              activeChats[threadId].messages.push({
                  text: msg.text,
                  type: msg.isAdmin ? 'admin' : 'user',
                  time: timeStr,
                  fileData: msg.file
              });
          });

          renderSidebar(); 
          renderChatWindow(); 
      });

      socket.on('auth_error', (msg) => {
          loginStatus.textContent = "⛔ " + msg;
          loginStatus.style.color = "var(--neon-red)";
          authOverlay.style.display = 'flex';
          unlockBtn.disabled = false;
          passInput.value = "";
      });

      socket.on('connect_error', () => {
          loginStatus.textContent = "Server sleeping. Retrying...";
          unlockBtn.disabled = false;
      });

      // --- INCOMING MESSAGES ---
      socket.on('chat message', (data) => {
          if (data.isAdmin) return;

          const senderId = data.senderId;
          const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          const originStr = data.origin || "Direct Link";

          if (!activeChats[senderId]) {
            activeChats[senderId] = { messages: [], unread: 0, origin: originStr };
          } else if (data.origin) {
            activeChats[senderId].origin = data.origin;
          }

          activeChats[senderId].messages.push({
            text: data.text,
            type: 'user',
            time: timeStr,
            fileData: data.file
          });

          playIncomingSound(); 

          if (currentSelectedUser === senderId) {
            renderChatWindow(); 
          } else {
            activeChats[senderId].unread += 1;
          }
          renderSidebar(); 
      });
    }

    function triggerLogin() {
      const pass = passInput.value.trim();
      if (pass.length > 0) {
        ADMIN_PASSWORD = pass;
        loginStatus.textContent = "Authenticating...";
        loginStatus.style.color = "var(--neon-cyan)";
        unlockBtn.disabled = true;
        
        if (!socket) {
            socket = io(SERVER_URL);
            initSocketListeners();
        } else {
            if (socket.connected) {
                socket.emit('admin login', ADMIN_PASSWORD);
            } else {
                socket.connect();
            }
        }
      }
    }
    
    unlockBtn.addEventListener('click', triggerLogin);
    passInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') triggerLogin(); });

    // --- WHATSAPP STYLE SIDEBAR & HEADER ---
    function renderSidebar() {
      userListUI.innerHTML = ''; 
      
      const sortedUsers = Object.keys(activeChats).sort((a, b) => {
        const msgsA = activeChats[a].messages;
        const msgsB = activeChats[b].messages;
        if (msgsA.length === 0) return 1;
        if (msgsB.length === 0) return -1;
        return msgsB[msgsB.length - 1].time.localeCompare(msgsA[msgsA.length - 1].time);
      });

      sortedUsers.forEach((userId) => {
        const userData = activeChats[userId];
        const div = document.createElement('div');
        div.className = `user-item ${currentSelectedUser === userId ? 'active' : ''}`;
        const shortId = userId.substring(0, 5).toUpperCase();
        
        const lastMsg = userData.messages.length > 0 ? userData.messages[userData.messages.length - 1] : null;
        let previewText = "No messages yet";
        let lastTime = "";
        
        if (lastMsg) {
          lastTime = lastMsg.time;
          if (lastMsg.fileData) previewText = "📁 Attachment";
          else {
            previewText = lastMsg.text;
            if(previewText.startsWith('[IMAGE]')) previewText = "🖼️ Image attached";
            if(previewText.startsWith('[FILE]')) previewText = "📁 File attached";
          }
        }

        const unreadClass = userData.unread > 0 ? 'unread' : '';
        const siteDomain = userData.origin.replace('https://', '').replace('http://', '').split('/')[0];
        
        div.innerHTML = `
          <div class="user-avatar"><i data-lucide="user"></i></div>
          <div class="user-info">
            <div class="user-header">
              <span class="user-id">Visitor-${shortId} <span class="origin-badge">${escapeHTML(siteDomain)}</span></span>
              <span class="user-time">${lastTime}</span>
            </div>
            <div class="user-footer">
              <span class="user-preview ${unreadClass}">${escapeHTML(previewText)}</span>
              <div class="unread-badge ${userData.unread > 0 ? 'show' : ''}">${userData.unread}</div>
            </div>
          </div>
        `;

        div.onclick = () => {
          currentSelectedUser = userId;
          activeChats[userId].unread = 0; 
          
          noChatScreen.style.display = 'none';
          
          chatHeaderName.textContent = `Visitor-${shortId}`;
          chatHeaderOrigin.textContent = userData.origin;
          
          msgInput.disabled = false; attachBtn.disabled = false;
          updateSendButtonState();
          msgInput.focus();
          
          if(window.innerWidth <= 768) toggleSidebar(); 
          
          renderSidebar(); 
          renderChatWindow(); 
        };
        userListUI.appendChild(div);
      });
      lucide.createIcons();
    }

    function renderChatWindow() {
      msgListUI.innerHTML = ''; 
      if (!currentSelectedUser || !activeChats[currentSelectedUser]) return;

      activeChats[currentSelectedUser].messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `msg msg-${msg.type}`;
        const label = msg.type === 'admin' ? 'YOU (ADMIN)' : 'VISITOR';
        
        let contentHTML = '';
        if (msg.fileData) {
          if (msg.fileData.mimetype && msg.fileData.mimetype.startsWith('image/')) {
            contentHTML = `<img src="${escapeHTML(msg.fileData.url)}" alt="img" style="max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 5px;">`;
          } else {
            contentHTML = `<div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border);">
                             <a href="${escapeHTML(msg.fileData.url)}" target="_blank" style="color: var(--neon-cyan); text-decoration: none; display: flex; align-items: center; gap: 8px;">
                               <i data-lucide="file"></i><span>${escapeHTML(msg.fileData.filename)}</span>
                             </a>
                           </div>`;
          }
        }
        
        if (msg.text) {
          if (contentHTML) contentHTML += '<br>';
          contentHTML += escapeHTML(msg.text);
        }

        div.innerHTML = `
          <span class="label" style="color: ${msg.type === 'admin' ? 'var(--neon-red)' : 'var(--neon-cyan)'}">${label}</span>
          ${contentHTML}
          <span class="time">${msg.time}</span>
        `;
        msgListUI.appendChild(div);
      });
      msgListUI.scrollTop = msgListUI.scrollHeight;
      lucide.createIcons();
    }

    function updateSendButtonState() {
      if (!currentSelectedUser) { sendBtn.disabled = true; return; }
      const hasText = msgInput.value.trim() !== "";
      const hasFile = currentFile !== null;
      sendBtn.disabled = !(hasText || hasFile);
    }
    msgInput.addEventListener('input', updateSendButtonState);

    // --- FILE UPLOAD LOGIC ---
    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      currentFile = file;
      previewContainer.style.display = 'block';

      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (e) => { imagePreview.src = e.target.result; };
        reader.readAsDataURL(file);
        msgInput.placeholder = "Add a caption...";
      } else {
        imagePreview.src = "https://cdn-icons-png.flaticon.com/512/2991/2991112.png"; 
        msgInput.placeholder = `File: ${file.name}`;
      }
      updateSendButtonState();
    });

    function clearAttachment() {
      currentFile = null; fileInput.value = ''; previewContainer.style.display = 'none'; imagePreview.src = '';
      msgInput.placeholder = "Reply to visitor...";
      updateSendButtonState(); lucide.createIcons();
    }
    cancelFileBtn.addEventListener('click', clearAttachment);

    function uploadFile(file) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        const formData = new FormData();
        formData.append('file', file);

        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) { progressBar.style.width = (e.loaded / e.total * 100) + '%'; }
        });

        xhr.onreadystatechange = () => {
          if (xhr.readyState === XMLHttpRequest.DONE) {
            setTimeout(() => { progressBar.style.width = '0%'; }, 500);
            if (xhr.status === 200) resolve(JSON.parse(xhr.responseText));
            else resolve(null);
          }
        };

        xhr.onerror = () => { progressBar.style.width = '0%'; reject(new Error('Network Error')); };
        xhr.open('POST', `${SERVER_URL}/upload`, true);
        xhr.send(formData);
      });
    }

    // --- SECURE MESSAGE EMISSION ---
    async function sendReply() {
      let text = msgInput.value.trim();
      if ((!text && !currentFile) || !currentSelectedUser) return;

      sendBtn.disabled = true; msgInput.disabled = true; attachBtn.disabled = true;

      let fileData = null;
      if (currentFile) {
        text = text.replace(`[File attached: ${currentFile.name}]`, '').trim();
        fileData = await uploadFile(currentFile).catch(() => null);
        
        sendBtn.disabled = false; msgInput.disabled = false; attachBtn.disabled = false;

        if (!fileData) { alert("File upload failed."); clearAttachment(); return; }
      }

      const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      activeChats[currentSelectedUser].messages.push({ text: text, type: 'admin', time: timeStr, fileData: fileData });
      renderChatWindow();
      renderSidebar(); 

      // Send payload using Secure Token
      socket.emit('chat message', {
        text: text,
        senderId: 'ADMIN',
        isAdmin: true,
        targetUser: currentSelectedUser, 
        token: ADMIN_TOKEN, 
        file: fileData
      });

      msgInput.value = ''; clearAttachment(); sendBtn.disabled = true; msgInput.focus();
    }

    sendBtn.addEventListener('click', sendReply);
    msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendReply(); });

  </script>
</body>
</html>
